# 自动发布流水线
# 当推送 v* 格式的 Tag 时：
# 1. 自动从 git log 生成变更记录（CHANGEHISTORY_full.md），作为 Release Asset 上传
# 2. 编译后端（多平台）+ 打包前端，发布到 GitHub Releases
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于 git log

      - name: 提取版本号
        id: version
        run: |
          # 从 tag 中提取版本号（去掉 v 前缀）
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

          # 获取上一个 tag（按版本排序）
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          echo "📌 当前版本: ${GITHUB_REF_NAME} (${VERSION})"
          echo "📌 上一版本: ${PREV_TAG:-无}"

      # ============================================================
      # 阶段 1：生成 CHANGEHISTORY.md（作为 Release Asset）
      # ============================================================
      - name: 生成变更记录
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 获取 tag 的日期
          TAG_DATE=$(git log -1 --format=%ai "${TAG}" | cut -d' ' -f1)

          # 获取 git log（过滤掉自动生成的文档更新提交）
          if [ -n "${PREV_TAG}" ]; then
            echo "📝 获取 ${PREV_TAG}..${TAG} 之间的提交记录"
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"%s" --no-merges | grep -v "^docs: 自动更新")
          else
            echo "📝 获取所有提交记录（首次发版）"
            COMMITS=$(git log "${TAG}" --pretty=format:"%s" --no-merges | grep -v "^docs: 自动更新")
          fi

          # 创建变更记录临时文件
          CHANGELOG_FILE=$(mktemp)

          {
            echo ""
            echo "## ${TAG}（${TAG_DATE}）"
            echo ""

            # 分类整理提交记录
            FEAT=""
            FIX=""
            REFACTOR=""
            DOCS=""
            BUILD=""
            OTHER=""

            while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in
                feat:*|feat\(*|添加*|新增*|实现*|支持*)
                  FEAT="${FEAT}\n- ${line}"
                  ;;
                fix:*|fix\(*|fix\ *|修复*|修正*)
                  FIX="${FIX}\n- ${line}"
                  ;;
                refactor:*|refactor\(*|重构*)
                  REFACTOR="${REFACTOR}\n- ${line}"
                  ;;
                docs:*|docs\(*|文档*|update\ README*|update\ CLAUDE*)
                  DOCS="${DOCS}\n- ${line}"
                  ;;
                build:*|build\(*|ci:*|ci\(*|构建*|部署*)
                  BUILD="${BUILD}\n- ${line}"
                  ;;
                *)
                  OTHER="${OTHER}\n- ${line}"
                  ;;
              esac
            done <<< "$COMMITS"

            # 输出分类后的变更记录
            if [ -n "$FEAT" ]; then
              echo "### 功能新增"
              echo -e "$FEAT"
              echo ""
            fi

            if [ -n "$FIX" ]; then
              echo "### 问题修复"
              echo -e "$FIX"
              echo ""
            fi

            if [ -n "$REFACTOR" ]; then
              echo "### 重构优化"
              echo -e "$REFACTOR"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 文档更新"
              echo -e "$DOCS"
              echo ""
            fi

            if [ -n "$BUILD" ]; then
              echo "### 构建与部署"
              echo -e "$BUILD"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### 其他变更"
              echo -e "$OTHER"
              echo ""
            fi

          } > "$CHANGELOG_FILE"

          echo "changelog_file=${CHANGELOG_FILE}" >> "$GITHUB_OUTPUT"

          echo "--- 生成的变更记录 ---"
          cat "$CHANGELOG_FILE"

      - name: 生成完整 CHANGEHISTORY.md 文件
        env:
          CHANGELOG_FILE: ${{ steps.changelog.outputs.changelog_file }}
        run: |
          if [ ! -f CHANGEHISTORY.md ]; then
            echo "# AllFi 版本历史" > CHANGEHISTORY.md
            echo "" >> CHANGEHISTORY.md
            echo "> 详细记录每个版本的变更内容。版本号与 Git Tag 保持一致。" >> CHANGEHISTORY.md
            echo "" >> CHANGEHISTORY.md
            echo "---" >> CHANGEHISTORY.md
          fi

          # 在第一个 "## v" 之前插入新版本的变更记录
          if grep -q "^## v" CHANGEHISTORY.md; then
            FIRST_VERSION_LINE=$(grep -n "^## v" CHANGEHISTORY.md | head -1 | cut -d: -f1)
            head -n $((FIRST_VERSION_LINE - 1)) CHANGEHISTORY.md > CHANGEHISTORY_full.md
            cat "$CHANGELOG_FILE" >> CHANGEHISTORY_full.md
            tail -n +${FIRST_VERSION_LINE} CHANGEHISTORY.md >> CHANGEHISTORY_full.md
          else
            cat CHANGEHISTORY.md > CHANGEHISTORY_full.md
            cat "$CHANGELOG_FILE" >> CHANGEHISTORY_full.md
          fi

          echo "--- 生成的完整 CHANGEHISTORY.md（前 50 行）---"
          head -50 CHANGEHISTORY_full.md
          echo "✅ CHANGEHISTORY_full.md 已生成（将作为 Release Asset 上传）"

      # ============================================================
      # 阶段 2：构建与发布
      # ============================================================
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: core/go.sum

      - name: 安装 Node.js + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: 构建前端
        working-directory: webapp
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: 打包前端产物
        run: tar -czf webapp-dist.tar.gz -C webapp/dist .

      - name: 复制前端产物到后端嵌入目录
        run: cp -r webapp/dist core/internal/statics/dist

      - name: 构建后端（多平台）
        working-directory: core
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X your-finance/allfi/internal/version.Version=${APP_VERSION} \
            -X your-finance/allfi/internal/version.BuildTime=${BUILD_TIME} \
            -X your-finance/allfi/internal/version.GitCommit=${GIT_COMMIT}"

          # linux/amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-linux-amd64 cmd/server/main.go

          # linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-linux-arm64 cmd/server/main.go

          # darwin/amd64 (macOS Intel)
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-darwin-amd64 cmd/server/main.go

          # darwin/arm64 (macOS Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-darwin-arm64 cmd/server/main.go

          # windows/amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-windows-amd64.exe cmd/server/main.go

          # windows/arm64
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 \
            go build -ldflags="${LDFLAGS}" -o ../allfi-windows-arm64.exe cmd/server/main.go

      - name: 准备配置文件
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          cp core/manifest/config/config.example.yaml core/manifest/config/config.yaml

      - name: 打包发布产物
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 后端二进制 + 配置文件 + 前端产物
          # Unix 平台
          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            mkdir -p "allfi-${APP_VERSION}-${platform}"
            cp "allfi-${platform}" "allfi-${APP_VERSION}-${platform}/allfi"
            cp core/manifest/config/config.yaml "allfi-${APP_VERSION}-${platform}/"
            cp -r webapp/dist "allfi-${APP_VERSION}-${platform}/webapp-dist"
            tar -czf "allfi-${APP_VERSION}-${platform}.tar.gz" "allfi-${APP_VERSION}-${platform}"
          done

          # Windows 平台（使用 zip 格式）
          for platform in windows-amd64 windows-arm64; do
            mkdir -p "allfi-${APP_VERSION}-${platform}"
            cp "allfi-${platform}.exe" "allfi-${APP_VERSION}-${platform}/allfi.exe"
            cp core/manifest/config/config.yaml "allfi-${APP_VERSION}-${platform}/"
            cp -r webapp/dist "allfi-${APP_VERSION}-${platform}/webapp-dist"
            zip -r "allfi-${APP_VERSION}-${platform}.zip" "allfi-${APP_VERSION}-${platform}"
          done

      - name: 生成 Release Notes
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # 从 git log 自动生成（带 short hash）
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges | grep -v "docs: 自动更新")
          else
            CHANGELOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges | grep -v "docs: 自动更新")
          fi

          # 生成 release notes
          {
            echo "全栈加密资产管理平台 — 聚合 CEX、DeFi、NFT 与传统资产"
            echo ""
            echo "## AllFi ${TAG}"
            echo ""
            echo "### Changes"
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo ""
            echo "📥 **安装**"
            echo ""
            echo "从 Assets 下载对应平台的压缩包，解压后运行："
            echo ""
            echo "- **Linux/macOS**: \`./allfi\`"
            echo "- **Windows**: \`allfi.exe\`"
            echo ""
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| Linux x86_64 | \`allfi-${APP_VERSION}-linux-amd64.tar.gz\` |"
            echo "| Linux ARM64 | \`allfi-${APP_VERSION}-linux-arm64.tar.gz\` |"
            echo "| macOS Intel | \`allfi-${APP_VERSION}-darwin-amd64.tar.gz\` |"
            echo "| macOS Apple Silicon | \`allfi-${APP_VERSION}-darwin-arm64.tar.gz\` |"
            echo "| Windows x86_64 | \`allfi-${APP_VERSION}-windows-amd64.zip\` |"
            echo "| Windows ARM64 | \`allfi-${APP_VERSION}-windows-arm64.zip\` |"
            echo "| 前端产物 | \`webapp-dist.tar.gz\` |"
            echo "| 完整变更历史 | \`CHANGEHISTORY_full.md\` |"
            echo ""
            echo "📚 **文档**"
            echo ""
            echo "- [项目说明](https://github.com/${REPO}/blob/master/README.md)"
            echo "- [开发指南](https://github.com/${REPO}/blob/master/CLAUDE.md)"
          } > release_notes.md

          echo "--- Release Notes ---"
          cat release_notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AllFi v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            allfi-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            allfi-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            allfi-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
            allfi-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            allfi-${{ steps.version.outputs.version }}-windows-amd64.zip
            allfi-${{ steps.version.outputs.version }}-windows-arm64.zip
            webapp-dist.tar.gz
            CHANGEHISTORY_full.md
